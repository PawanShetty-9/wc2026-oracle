# ─────────────────────────────────────────────────────────────────────────────
# Streamlit theme — Cyberpunk + Sacred Geometry
# primaryColor     → neon cyan for accents, buttons, highlighted text
# backgroundColor  → near-black deep space
# secondaryBg      → dark indigo for sidebars and card panels
# textColor        → cool off-white for readability
# font             → monospace keeps the "terminal / data-feed" aesthetic
# ─────────────────────────────────────────────────────────────────────────────
[theme]
primaryColor              = "#00FFD1"
backgroundColor           = "#060611"
secondaryBackgroundColor  = "#0D0D2B"
textColor                 = "#E0E0FF"
font                      = "monospace"

[server]
headless          = true     # required for Streamlit Cloud
enableCORS        = false
enableXsrfProtection = true

[browser]
gatherUsageStats  = false    # opt out of Streamlit telemetry
