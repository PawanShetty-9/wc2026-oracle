name: WC2026 Oracle CI

on:
  push:
    branches: ["main", "**"]
  pull_request:

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke-test app import
        run: |
          python -c "
          import data.wc2026_teams
          import models.elo
          import models.dixon_coles
          import strategy.ev
          import strategy.kelly
          import strategy.portfolio
          print('All imports OK')
          "

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short --no-header

      - name: Lint with ruff (non-blocking)
        run: |
          pip install ruff --quiet
          ruff check . --select E,W,F --ignore E501 || true
